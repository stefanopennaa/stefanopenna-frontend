{{ define "main" }}
  <section
    class="resume-section p-3 p-lg-5 d-flex flex-column"
    id="{{ replace .Title " " "-" }}"
  >
    <div class="my-auto">
      <h1 class="mb-3 text-center">
        <span class="text-primary">{{ .Title }}</span>
      </h1>
      {{ partial "contact-qr" . }}
      <div class="text-center lead-copy mx-auto">
        {{ .Content }}
      </div>
    </div>
  </section>
{{ end }}

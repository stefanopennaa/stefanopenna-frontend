{{ define "main" }}
  {{ partial "breadcrumbs" . }}
  <section class="resume-section p-3 p-lg-5 d-flex flex-column">
    <div class="my-auto">
      <h2 class="mb-0"><span class="text-primary">{{ .Title }}</span></h2>
      {{ .Content }}
      {{ if and .Params.link (not (eq .Params.showProjectLink false)) }}
        {{ $link := .Params.link }}
        <p>Project link: <a href="{{ $link }}">{{ $link }}</a></p>
      {{ end }}
      {{ partial "techtags" . }}
    </div>
  </section>
{{ end }}
